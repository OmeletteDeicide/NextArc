name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Analyse & tests ───────────────────────────────────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app_constants.dart
        run: |
          cat > lib/core/constants/app_constants.dart <<EOF
          class AppConstants {
            AppConstants._();
            static const String anilistEndpoint = 'https://graphql.anilist.co';
            static const String anilistClientId = '${{ secrets.ANILIST_CLIENT_ID }}';
            static const String anilistRedirectUri = 'nextarc://auth/callback';
            static const String anilistTokenProxyUrl = 'https://anilisttoken-qgwvvtarwa-ew.a.run.app';
            static const int defaultPageSize = 20;
            static const int searchDebounceMs = 400;
          }
          EOF

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  # ── 2. Build AAB release signé ───────────────────────────────────────────────
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest
    needs: analyze
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app_constants.dart
        run: |
          cat > lib/core/constants/app_constants.dart <<EOF
          class AppConstants {
            AppConstants._();
            static const String anilistEndpoint = 'https://graphql.anilist.co';
            static const String anilistClientId = '${{ secrets.ANILIST_CLIENT_ID }}';
            static const String anilistRedirectUri = 'nextarc://auth/callback';
            static const String anilistTokenProxyUrl = 'https://anilisttoken-qgwvvtarwa-ew.a.run.app';
            static const int defaultPageSize = 20;
            static const int searchDebounceMs = 400;
          }
          EOF

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/nextarc.jks

      - name: Create key.properties
        run: |
          cat > android/app/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=nextarc.jks
          EOF

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: nextarc-release.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
